// ─── HELPERS ────────────────────────────────────────────────────────────────

function scoreColor(s) {
  if (s >= 85) return "#22c55e";
  if (s >= 70) return "#60a5fa";
  return "#f87171";
}

function boldify(text) {
  const parts = text.split(/\*(.*?)\*/g);
  return parts.map((p, i) => i % 2 === 1 ? <strong key={i}>{p}</strong> : p);
}

function StatusBadge({ status }) {
  const map = {
    Preseleccionado: { bg: "#14532d", cl: "#86efac" },
    "En revisión":  { bg: "#1e3a5f", cl: "#93c5fd" },
    Descartado:     { bg: "#450a0a", cl: "#fca5a5" },
    Activa:         { bg: "#1d4ed820", cl: "#60a5fa" },
  };
  const { bg, cl } = map[status] || { bg: "#1e293b", cl: "#94a3b8" };
  return (
    <span className="badge" style={{ background: bg, color: cl, fontSize: 11 }}>
      {status}
    </span>
  );
}

function WhatsAppView() {
  const [msgs, setMsgs] = useState([]);
  const [showTyping, setShowTyping] = useState(false);
  const chatRef = useRef(null);
  const started = useRef(false);

  useEffect(() => {
    if (started.current) return;
    started.current = true;

    waMessages.forEach((m, i) => {
      setTimeout(() => {
        if (m.from === "bot") {
          setShowTyping(true);
          setTimeout(() => {
            setShowTyping(false);
            setMsgs(prev => [...prev, m]);
          }, 900);
        } else {
          setMsgs(prev => [...prev, m]);
        }
      }, m.delay + i * 150);
    });
  }, []);

  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;

  const filterQs = [

              <div style={{ fontSize:14, fontWeight:700, color:"#fff" }}>Talent Intelligence Bot</div>

          <div className="wa-chat-body" ref={chatRef}>

      {modal !== null && <CandidateModal idx={modal} onClose={() => setModal(null)} />}

      <div className="demo-topbar">
        <a href="../../index.html#proyectos">← Volver al portafolio</a>
        <div className="demo-topbar-sep"></div>
        <span className="demo-topbar-label">⚡ DEMO — datos de ejemplo</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
