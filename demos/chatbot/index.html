// ─── HELPERS ─────────────────────────────────────────────────────────────────
function normalize(s) {
  return s.toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g, '')
    .replace(/[¿?¡!.,;:()]/g, ' ');
}

function vectorSearch(query, topK = 3) {
  const words = normalize(query).split(/\s+/).filter(w => w.length > 2);
  if (!words.length) return [];

  const scored = KB.map(chunk => {
    let score = 0;
    const nTitle   = normalize(chunk.title);
    const nContent = normalize(chunk.content);
    const nTags    = chunk.tags.map(normalize);

    words.forEach(w => {
      nTags.forEach(t => {
        if (t === w)                              score += 3;
        else if (t.includes(w) || w.includes(t)) score += 1.5;
      });
      if (nTitle.includes(w))   score += 2;
      if (nContent.includes(w)) score += 0.8;
    });

    const maxScore  = words.length * 6.8;
    const rawNorm   = Math.min(score / maxScore, 1);
    const similarity = score > 0
      ? parseFloat((0.51 + rawNorm * 0.47).toFixed(2))
      : 0;

    return { ...chunk, similarity, rawScore: score };
  });

  return scored
    .filter(c => c.rawScore > 0)
    .sort((a, b) => b.similarity - a.similarity)
    .slice(0, topK);
}

function buildResponse(chunks) {
  if (!chunks.length) {
    return {
      text: 'No encontré información específica sobre eso en nuestra base de conocimiento. Puedo ayudarte con rentas de autos, promociones activas, destinos turísticos o guías de viaje. ¿Sobre qué te gustaría saber más?',
      chunks: [],
    };
  }
  const cat = chunks[0].cat;
  const n   = chunks.length;
  const texts = {
    promo:   `¡Encontré ${n} promoción${n>1?'es':''} que te pueden interesar!`,
    destino: `Tengo info sobre ${n} destino${n>1?'s turísticos':' turístico'} para ti:`,
    blog:    `Encontré ${n} artículo${n>1?'s':''} en nuestro blog sobre ese tema:`,
    renta:   'Aquí tienes la información sobre nuestro servicio de renta:',
  };
  return { text: texts[cat] || 'Encontré esto en nuestra base de conocimiento:', chunks };
}

// Renderiza **negrita** en el texto
function RichText({ text }) {
  const parts = text.split(/(\*\*[^*]+\*\*)/g);
  return (
    <>
      {parts.map((p, i) =>
        p.startsWith('**') && p.endsWith('**')
          ? <strong key={i}>{p.slice(2,-2)}</strong>
          : p
      )}
    </>
  );
}

// ─── HELPERS DE PARSEO ───────────────────────────────────────────────────────

function splitOutsideParens(str) {
  const result = [];
  let depth = 0, current = '';
  for (const ch of str) {
    if (ch === '(') depth++;
    else if (ch === ')') depth--;
    else if (ch === ',' && depth === 0) { result.push(current.trim()); current = ''; continue; }
    current += ch;
  }
  if (current.trim()) result.push(current.trim());
  return result;
}

// ─── COMPONENTES ─────────────────────────────────────────────────────────────

function InfoCard({ chunk }) {
  const CONFIG = {
    promo:   { label: 'Promoción'         },
    destino: { label: 'Destino turístico' },
    blog:    { label: 'Artículo del blog' },
    renta:   { label: 'Renta de autos'   },
  };

  // Código de promo
  const promoCode = chunk.cat === 'promo'
    ? (chunk.content.match(/Código:\s*([A-Z0-9]+)/) || [])[1] || null
    : null;

  // Chips de destino: "Nombre (X km, Xh)"
  const destChips = chunk.cat === 'destino' ? (() => {
    const ci = chunk.content.indexOf(':');
    if (ci === -1) return [];
    const part = chunk.content.slice(ci + 1).split('.')[0];
    return splitOutsideParens(part)
      .map(s => { const m = s.trim().match(/^([^(]+?)\s*\(([^)]+)\)$/); return m ? { name: m[1].trim(), dist: m[2].trim() } : null; })
      .filter(Boolean).slice(0, 4);
  })() : [];

  // Tips numerados en blogs: "1) ... 2) ..."
  const blogTips = chunk.cat === 'blog' && /^\s*1\)/.test(chunk.content)
    ? chunk.content.split(/\s*\d+\)\s*/).slice(1).map(s => s.replace(/\s*\.\s*$/, '').trim()).filter(Boolean).slice(0, 4)
    : [];

  // Chips de precio para renta
  const rentaChips = chunk.cat === 'renta' ? (() => {
    const chips = [];
    for (const m of chunk.content.matchAll(/([A-Za-záéíóú\/]+)\s+desde\s+(\$\d+\/día)/g))
      chips.push(`${m[1]} ${m[2]}`);
    for (const m of chunk.content.matchAll(/\b([A-Z]{2,5})\s+(\$\d+\/día)/g))
      chips.push(`${m[1]} ${m[2]}`);
    return chips.slice(0, 5);
  })() : [];

  return (
    <div className={`info-card ${chunk.cat}`}>
      <div className="card-band">
        <span className="card-band-icon">{chunk.icon}</span>
        <div className="card-band-info">
          <span className="card-band-title">{chunk.title}</span>
          <span className="card-band-tag">{CONFIG[chunk.cat].label}</span>
        </div>
      </div>
      <div className="card-body">
        {blogTips.length > 0 ? (
          <ul className="blog-tip-list">
            {blogTips.map((tip, i) => (
              <li key={i} className="blog-tip-item">
                <span className="blog-tip-num">{i + 1}</span>
                <span>{tip}</span>
              </li>
            ))}
          </ul>
        ) : (
          <p className="card-content">{chunk.content}</p>
        )}

        {promoCode && (
          <div className="promo-code-row">
            <div className="promo-code-badge">
              <span className="promo-code-label">Código</span>
              <span className="promo-code-sep">→</span>
              <span className="promo-code-value">{promoCode}</span>
            </div>
          </div>
        )}

        {destChips.length > 0 && (
          <div className="dest-chips">
            {destChips.map((d, i) => (
              <span key={i} className="dest-chip">📍 {d.name} · {d.dist}</span>
            ))}
          </div>
        )}

        {rentaChips.length > 0 && (
          <div className="renta-prices">
            {rentaChips.map((p, i) => (
              <span key={i} className="renta-price-chip">✦ {p}</span>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── N8N FLOW ─────────────────────────────────────────────────────────────────
function N8nFlow({ activeStep, isTyping, hasProcessed }) {
  const getStepIdx = () => {
    if (!hasProcessed && !isTyping) return -1;   // sin consultas aún
    if (!isTyping && hasProcessed)  return FLOW_STEPS.length; // todo hecho
    return FLOW_STEPS.findIndex(s => s.id === activeStep);
  };
  const stepIdx = getStepIdx();

  return (
    <div className="flow-nodes">
      {FLOW_STEPS.map((step, i) => {
        const isDone       = i < stepIdx;
        const isProcessing = isTyping && i === stepIdx;
        const isIdle       = !hasProcessed && !isTyping;

        return (
          <div className="flow-node" key={step.id}>
            <div className="node-connector">
              <div className={`node-dot ${isProcessing ? 'processing' : isDone ? 'done' : ''}`} />
              {i < FLOW_STEPS.length - 1 && (
                <div className={`node-line ${isDone ? 'done' : ''}`} />
              )}
            </div>
            <div className={`node-card ${isProcessing ? 'processing' : isDone ? 'done' : isIdle ? 'idle' : ''}`}>
              <div className="node-card-inner">
                <span className="node-icon">{step.icon}</span>
                <div className="node-info">
                  <div className="node-label">{step.label}</div>
                  <div className="node-desc">{step.desc}</div>
                </div>
                <span className={`node-status ${isProcessing ? 'processing' : isDone ? 'done' : 'idle'}`}>
                  {isProcessing ? '⟳' : isDone ? '✓' : '·'}
                </span>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── DOCUMENTOS RECUPERADOS ───────────────────────────────────────────────────
function RetrievedChunks({ chunks, hasProcessed }) {
  const catLabels = { promo:'Promo', destino:'Dest.', blog:'Blog', renta:'Renta' };
  return (
    <div className="retrieved-section">
      <div className="retrieved-title">
        Documentos recuperados
        {chunks.length > 0 && (
          <span className="retrieved-count">{chunks.length}</span>
        )}
      </div>
      {!hasProcessed && (
        <p className="chunk-empty">Esperando consulta...</p>
      )}
      {hasProcessed && chunks.length === 0 && (
        <p className="chunk-empty">Sin resultados (baja similitud)</p>
      )}
      {chunks.map((c, i) => (
        <div key={c.id} className="chunk-item" style={{ animationDelay: `${i * 0.12}s` }}>
          <span className="chunk-score">{c.similarity}</span>
          <span className="chunk-title">{c.icon} {c.title}</span>
          <span className={`chunk-cat ${c.cat}`}>{catLabels[c.cat]}</span>
        </div>
      ))}
    </div>
  );
}

function App() {
  const [messages, setMessages] = useState([
    {
      id: 0, type: 'bot',
      text: 'Hola, soy el asistente virtual impulsado por n8n + embeddings vectoriales. Puedo ayudarte con rentas de autos, promociones activas, destinos turísticos y guías de viaje. ¿En qué te puedo ayudar hoy?',
      chunks: [],
    },
  ]);

  const [input,          setInput]          = useState('');
  const [isTyping,       setIsTyping]       = useState(false);
  const [activeStep,     setActiveStep]     = useState('webhook');
  const [retrievedChunks, setRetrievedChunks] = useState([]);
  const [processedCount, setProcessedCount] = useState(0);

  const messagesEndRef = useRef(null);
  const inputRef       = useRef(null);

  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages, isTyping]);

  const runWorkflow = useCallback(async (query) => {
    const steps  = ['webhook','embed','search','context','llm','respond'];
    const delays = [180, 420, 520, 280, 720, 100];

    let chunks = [];

    for (let i = 0; i < steps.length; i++) {
      setActiveStep(steps[i]);
      await new Promise(r => setTimeout(r, delays[i]));

      if (steps[i] === 'search') {
        chunks = vectorSearch(query);
        setRetrievedChunks(chunks);
      }
    }

    setIsTyping(false);
    const response = buildResponse(chunks);
    setMessages(prev => [...prev, { id: Date.now(), type: 'bot', ...response }]);
    setProcessedCount(p => p + 1);
  }, []);

  const sendMessage = useCallback(async (text) => {
    const trimmed = text.trim();
    if (!trimmed || isTyping) return;

    setInput('');
    setIsTyping(true);
    setRetrievedChunks([]);
    setMessages(prev => [...prev, { id: Date.now(), type: 'user', text: trimmed }]);

    await runWorkflow(trimmed);
  }, [isTyping, runWorkflow]);

  const handleKey = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(input);
    }
  };

  return (
    <div>
      {/* HEADER */}
      <header className="app-header">
        <div className="header-brand">
          <div className="brand-logo">🚗</div>
          <div>
            <div className="brand-name">Chatbot IA — Asistente Virtual</div>
            <div className="brand-tagline">Chatbot con n8n · RAG · Embeddings vectoriales · pgvector</div>
          </div>
        </div>
        <div className="header-right">
          {['n8n','OpenAI','pgvector','RAG'].map(t => (
            <span key={t} className="tech-tag">{t}</span>
          ))}
          <span className="demo-badge">DEMO</span>
        </div>
      </header>

      {/* LAYOUT */}
      <div className="app-layout">

        {/* ── CHAT PANEL ── */}
        <div className="chat-panel">
          <div className="chat-messages">
            {messages.map(msg =>
              msg.type === 'bot'
                ? <BotMessage  key={msg.id} msg={msg} />
                : <UserMessage key={msg.id} text={msg.text} />
            )}
            {isTyping && <TypingIndicator />}
            <div ref={messagesEndRef} />
          </div>

          {/* Quick replies */}
          <div className="quick-replies">
            {QUICK_REPLIES.map(qr => (
              <button
                key={qr.label}
                className="quick-btn"
                onClick={() => sendMessage(qr.query)}
                disabled={isTyping}
              >
                {qr.label}
              </button>
            ))}
          </div>

          {/* Input */}
          <div className="chat-input-bar">
            <textarea
              ref={inputRef}
              className="chat-input"
              placeholder="Escribe tu consulta... (Ej: ¿Tienen SUVs disponibles en Cancún?)"
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={handleKey}
              rows={1}
              disabled={isTyping}
            />
            <button
              className="send-btn"
              onClick={() => sendMessage(input)}
              disabled={!input.trim() || isTyping}
              title="Enviar (Enter)"
            >
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
        </div>

        {/* ── WORKFLOW PANEL ── */}
        <div className="workflow-panel">
          <div className="workflow-header">
            <div className="workflow-label">
              <span className="workflow-title">Flujo n8n — Procesamiento RAG</span>
              <span className="n8n-badge">n8n</span>
            </div>
            <div className="workflow-subtitle">
              {processedCount === 0
                ? 'Esperando primera consulta...'
                : `${processedCount} consulta${processedCount !== 1 ? 's' : ''} procesada${processedCount !== 1 ? 's' : ''} · simulación en tiempo real`}
            </div>
          </div>

          <div className="workflow-body">
            <N8nFlow
              activeStep={activeStep}
              isTyping={isTyping}
              hasProcessed={processedCount > 0}
            />
          </div>

          <RetrievedChunks
            chunks={retrievedChunks}
            hasProcessed={processedCount > 0}
          />
        </div>

      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
