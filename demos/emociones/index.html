// ─── COMPONENTES ─────────────────────────────────────────────────────────────

function ConfidenceBars({ scores }) {
  return (
    <div className="confidence-section">
      <div className="conf-title">Probabilidades por clase — FER2013</div>
      {BAR_LABELS.map(label => {
        const val = scores[label] || 0;
        const color = BAR_COLORS[label];
        return (
          <div key={label} className="conf-row">
            <span className="conf-label">
              <span style={{ fontSize:'0.75rem' }}>{SELECTOR.find(s => s.label === label || (label === 'Alegre' && s.key === 'feliz') || (label === 'Sorprendido' && s.key === 'sorprendido') || (label === 'Asustado' && s.key === 'asustado') || (label === 'Enojado' && s.key === 'enojado') || (label === 'Triste' && s.key === 'triste'))?.emoji || ''}</span>
              {label}
            </span>
            <div className="conf-bar-wrap">
              <div className="conf-bar-fill" style={{ width: `${val}%`, background: color }}/>
            </div>
            <span className="conf-pct" style={{ color }}>{val}%</span>
          </div>
        );
      })}
    </div>
  );
}

function EmotionSelector({ current, onChange }) {
  return (
    <div className="emotion-selector">
      <div className="selector-title">Simular emoción detectada</div>
      <div className="selector-grid">
        {SELECTOR.map(({ key, emoji, label }) => {
          const color = EMOTIONS[key].color;
          return (
            <button
              key={key}
              className={`emo-btn${current === key ? ' active' : ''}`}
              style={{ '--emo-color': color }}
              onClick={() => onChange(key)}
            >
              <span className="emo-emoji">{emoji}</span>
              <span className="emo-label">{label}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

function BotMessage({ text }) {
  return (
    <div className="msg-row bot">
      <div className="msg-avatar bot">🧠</div>
      <div className="msg-bubble bot">{text}</div>

}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [emotion,   setEmotion]   = useState('neutral');
  const [messages,  setMessages]  = useState([
    { id:0, type:'bot', text:'Sistema iniciado. Cámara activa — analizando expresión facial en tiempo real... 👁️ Selecciona una emoción en el panel izquierdo o escribe algo para comenzar la conversación.' }
  ]);
  const [quickReplies, setQuickReplies] = useState([]);
  const [isTyping,  setIsTyping]  = useState(false);
  const [input,     setInput]     = useState('');
  const [fps,       setFps]       = useState(28);

  const endRef = useRef(null);

  // Simular FPS fluctuante
  useEffect(() => {
    const t = setInterval(() => setFps(27 + Math.floor(Math.random() * 4)), 1200);
    return () => clearInterval(t);
  }, []);

  useEffect(() => {
    endRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages, isTyping]);

  const emo = EMOTIONS[emotion];

  const handleEmotionChange = useCallback((key) => {
    setEmotion(key);
    setQuickReplies([]);
    setIsTyping(true);

    setTimeout(() => {
      setIsTyping(false);
      const e = EMOTIONS[key];
      setMessages(prev => [...prev, { id: Date.now(), type: 'bot', text: e.intro }]);
      setTimeout(() => setQuickReplies(e.replies), 300);
    }, 1600);
  }, []);

  const sendMessage = useCallback(async (text) => {
    const trimmed = text.trim();
    if (!trimmed || isTyping) return;

    setInput('');
    setQuickReplies([]);
    setMessages(prev => [...prev, { id: Date.now(), type: 'user', text: trimmed }]);
    setIsTyping(true);

    const reply = emo.responses[trimmed] ||
      `Interesante. Seguimos detectando "${emo.label}" con ${emo.scores[emo.label === 'Alegre' ? 'Alegre' : emo.label]}% de confianza. ¿Hay algo más en lo que pueda acompañarte?`;

    setTimeout(() => {
      setIsTyping(false);
      setMessages(prev => [...prev, { id: Date.now(), type: 'bot', text: reply }]);
    }, 1400);
  }, [isTyping, emo]);

  const handleKey = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(input); }
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100vh' }}>

      {/* HEADER */}
      <header className="app-header">
        <div className="header-left">
          <div className="header-logo">🎭</div>
          <div>
            <div className="header-title">Reconocimiento Facial de Emociones</div>
            <div className="header-sub">Opción de grado · Python · Computer Vision + Conversación Empática</div>
          </div>
        </div>
        <div className="header-right">
          <span className="tech-pill python">Python</span>
          <span className="tech-pill opencv">OpenCV</span>
          <span className="tech-pill deepface">DeepFace</span>
          <span className="tech-pill gpt">GPT-4o</span>
          <span className="demo-pill">DEMO</span>
        </div>
      </header>

      {/* LAYOUT */}
      <div className="app-layout">

        {/* ── PANEL CÁMARA ── */}
        <div className="camera-panel">

          {/* Vista de cámara */}
          <div className="cam-view-wrap">
            <div className="cam-view">

              {/* Cara SVG */}
              <div className="cam-face-area">
                <FaceSVG emotion={emotion} />
              </div>

              {/* Landmarks SVG overlay */}
              <svg className="landmarks-svg" viewBox="0 0 100 75" preserveAspectRatio="none">
                {LANDMARKS.map((pt, i) => (
                  <circle
                    key={i}
                    cx={pt.x / 2} cy={pt.y * 0.355}
                    r="0.5"
                    fill={emo.color}
                    opacity="0.65"
                  />
                ))}
              </svg>

              {/* Bounding box */}
              <div className="bbox">
                {['tl','tr','bl','br'].map(c => (
                  <div key={c} className={`bbox-corner ${c}`} style={{ borderColor: emo.color }}/>
                ))}
                <div className="scan-line" style={{ color: emo.color }}/>
              </div>

              {/* Overlay: emotion badge */}
              <div className="cam-overlay-tl">
                <div className="emotion-overlay-badge" style={{ borderColor: emo.borderColor, color: emo.color }}>
                  {emo.emoji} {emo.label.toUpperCase()}
                </div>
              </div>

              {/* Overlay: REC */}
              <div className="cam-overlay-tr">
                <span className="fps-badge"><span className="rec-dot"/>REC · {fps} FPS</span>
              </div>

              {/* Overlay: info */}
              <div className="cam-overlay-bl">
                640×480 · DeepFace · MediaPipe
              </div>
            </div>
          </div>

          {/* Barras de confianza */}
          <ConfidenceBars scores={emo.scores} />

          {/* Selector de emoción */}
          <EmotionSelector current={emotion} onChange={handleEmotionChange} />
        </div>

        {/* ── PANEL CHAT ── */}
        <div className="chat-panel">

          {/* Barra de estado emocional */}
          <div className="emotion-status-bar">
            <div className="emotion-status-badge"
              style={{ background: emo.bgLight, borderColor: emo.borderColor, color: emo.color }}>
              <div className="emotion-status-dot" style={{ background: emo.color }}/>
              {emo.emoji} {emo.label}
            </div>
            <span className="emotion-status-label">Emoción detectada · respuesta empática activa</span>
            <span className="emotion-status-conf">conf. {emo.scores[Object.keys(emo.scores).find(k => emo.scores[k] === Math.max(...Object.values(emo.scores)))]}%</span>
          </div>

          {/* Mensajes */}
          <div className="chat-messages">
            {messages.map(m =>
              m.type === 'bot'
                ? <BotMessage key={m.id} text={m.text}/>
                : <UserMessage key={m.id} text={m.text}/>
            )}
            {isTyping && <TypingIndicator/>}
            <div ref={endRef}/>
          </div>

          {/* Quick replies */}
          {quickReplies.length > 0 && (
            <div className="quick-replies">
              {quickReplies.map((r, i) => (
                <button
                  key={i}
                  className="quick-btn"
                  style={{ animationDelay: `${i * 0.08}s` }}
                  onClick={() => sendMessage(r)}
                  disabled={isTyping}
                >
                  {r}
                </button>
              ))}
            </div>
          )}

          {/* Input */}
          <div className="chat-input-bar">
            <textarea
              className="chat-input"
              placeholder="Escribe algo... el asistente responde según tu emoción detectada"
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={handleKey}
              rows={1}
              disabled={isTyping}
            />
            <button
              className="send-btn"
              onClick={() => sendMessage(input)}
              disabled={!input.trim() || isTyping}
            >
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
        </div>

      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
